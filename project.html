<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Calorie & Routine Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Calorie & Routine Tracker</h1>
        <p>Track your daily calories and routine</p>
    </header>

    <!-- Calorie Section -->
    <section class="container">
        <h2>Calorie Tracker</h2>

        <div class="input-box">
            <input type="text" placeholder="Food Item">
            <input type="number" placeholder="Calories">
            <button>Add</button>
        </div>

        <div class="list">
            <p>🍎 Apple - 95 cal</p>
            <p>🍔 Burger - 250 cal</p>
        </div>

        <div class="total">
            <h3>Total Calories: 345</h3>
        </div>
    </section>

    <!-- Routine Section -->
    <section class="container">
        <h2>Daily Routine</h2>

        <div class="routine-list">
            <label><input type="checkbox"> Wake up early</label>
            <label><input type="checkbox"> Study</label>
            <label><input type="checkbox"> Workout</label>
            <label><input type="checkbox"> Sleep on time</label>
        </div>
    </section>

    <footer>
        <p>© 2026 Tracker App</p>
    </footer>

</body>
</html>
